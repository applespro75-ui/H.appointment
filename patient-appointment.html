<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal - Hospital System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f1117;
            min-height: 100vh;
            color: #e0e0e0;
        }



        .page-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 36px 20px 60px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .page-heading {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .page-sub {
            font-size: 14px;
            color: #9aa0a6;
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #555;
            margin-bottom: 16px;
        }

        /* ── Hospital grid ── */
        .hospital-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .hosp-card {
            background: #1c1f26;
            border: 1.5px solid #2d3748;
            border-radius: 18px;
            padding: 22px 20px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hosp-card:hover {
            border-color: #4285f4;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(66, 133, 244, .15);
        }

        .hosp-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            font-size: 22px;
            background: linear-gradient(135deg, #1a3550, #1a4a6e);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .hosp-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .hosp-hours {
            font-size: 12px;
            color: #9aa0a6;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hours-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34a853;
            flex-shrink: 0;
        }

        .skeleton {
            background: linear-gradient(90deg, #1e2330 25%, #252b3b 50%, #1e2330 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 18px;
            height: 94px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ── Hospital detail ── */
        .hosp-header {
            background: #1c1f26;
            border: 1px solid #2d3748;
            border-radius: 18px;
            padding: 22px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
        }

        .hosp-header-icon {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            font-size: 26px;
            background: linear-gradient(135deg, #1a3550, #1a4a6e);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .hosp-header-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .hosp-header-hours {
            font-size: 13px;
            color: #9aa0a6;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Tabs ── */
        .tab-bar {
            display: flex;
            border-bottom: 1.5px solid #2d3748;
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 11px 22px;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2.5px solid transparent;
            margin-bottom: -1.5px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #4285f4;
            border-bottom-color: #4285f4;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* ── Form ── */
        .form-card {
            background: #1c1f26;
            border: 1px solid #2d3748;
            border-radius: 18px;
            padding: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9aa0a6;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 13px 15px;
            border: 1.5px solid #2d3748;
            border-radius: 10px;
            font-size: 15px;
            background: #141720;
            color: white;
            transition: border-color 0.25s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4285f4;
            background: #1a1e2a;
        }

        select option {
            background: #1c1f26;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #34a853, #2e7d32);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(52, 168, 83, .3);
            margin-top: 4px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 168, 83, .4);
        }

        .btn-submit:disabled {
            opacity: .6;
            transform: none;
            cursor: not-allowed;
        }

        /* ── Appointments ── */
        .appt-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .appt-row {
            background: #141720;
            border: 1px solid #2d3748;
            border-radius: 14px;
            padding: 16px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1.4fr auto;
            align-items: center;
            gap: 12px;
        }

        .field-label {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            font-weight: 700;
        }

        .field-val {
            font-size: 14px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(15, 82, 186, .12);
            color: #a6c5d7;
            border: 1px solid #0f52ba;
            white-space: nowrap;
        }

        .appt-empty {
            text-align: center;
            padding: 50px 20px;
            color: #555;
        }

        .appt-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: .5;
        }

        .msg {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 14px;
        }

        .err {
            color: #e74c3c;
            padding: 20px;
            font-size: 14px;
        }

        @media(max-width:580px) {
            .appt-row {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>



    <div class="page-wrap" id="page-wrap">
        <div class="msg">Loading…</div>
    </div>

    <script type="module">
        import { db, collection, getDocs, addDoc, query, where } from './firebase-config.js';

        const wrap = document.getElementById('page-wrap');

        /* ── Hash routing helpers ──────────────────────────────────
           URL format:  patient-appointment.html          → grid
                        patient-appointment.html#SLUG     → form for that hospital
        ─────────────────────────────────────────────────────────── */
        function getSlug() {
            const hash = window.location.hash.replace(/^#/, '').trim();
            return hash || null;
        }

        function goHome() {
            // Clear hash and show grid
            history.pushState('', document.title, window.location.pathname);
            boot();
        }

        // Re-render on back/forward navigation
        window.addEventListener('hashchange', boot);

        /* ── Time helpers ─────────────────────────────────────── */
        function fmtTime(t) {
            if (!t) return null;
            const [h, m] = t.split(':').map(Number);
            return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
        }
        function toLocalISO(d) {
            const p = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
        }
        function setDatetimeLimits() {
            const inp = document.getElementById('time-select');
            if (!inp) return;
            const now = new Date(), max = new Date(now.getTime() + 86400000);
            inp.min = toLocalISO(now); inp.max = toLocalISO(max); inp.value = toLocalISO(now);
        }

        /* ══════════════════════════════════════════════════════
           VIEW A — Hospital grid (no hash)
        ══════════════════════════════════════════════════════ */
        async function renderGrid() {


            wrap.innerHTML = `
            <div class="page-heading">Find a Hospital</div>
            <p class="page-sub">Select a hospital to book an appointment</p>
            <div class="section-label">Registered Hospitals</div>
            <div class="hospital-grid" id="hosp-grid">
                <div class="skeleton"></div>
                <div class="skeleton" style="opacity:.4"></div>
            </div>`;

            try {
                const snap = await getDocs(collection(db, 'receptionists'));
                const grid = document.getElementById('hosp-grid');
                grid.innerHTML = '';

                if (snap.empty) {
                    grid.innerHTML = '<p style="color:#555;font-size:14px;grid-column:1/-1">No hospitals registered yet.</p>';
                    return;
                }

                snap.forEach(docSnap => {
                    const h = { id: docSnap.id, ...docSnap.data() };
                    // Use slug field; fallback to Firestore doc ID
                    const hashSlug = encodeURIComponent(h.slug || h.id);
                    const open = fmtTime(h.openTime);
                    const close = fmtTime(h.closeTime);
                    const hours = (open && close)
                        ? `<span class="hours-dot"></span>${open} – ${close}`
                        : '<span style="color:#444">Hours not set</span>';

                    const card = document.createElement('a');
                    card.className = 'hosp-card';
                    // Hash link — never sent to server, works everywhere
                    card.href = `#${hashSlug}`;
                    card.innerHTML = `
                    <div class="hosp-icon">🏥</div>
                    <div>
                        <div class="hosp-name">${h.hospitalName || 'Hospital'}</div>
                        <div class="hosp-hours">${hours}</div>
                    </div>`;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('hosp-grid').innerHTML = '<p class="err">Failed to load hospitals. Please refresh.</p>';
            }
        }

        /* ══════════════════════════════════════════════════════
           VIEW B — Hospital booking form (hash = slug)
        ══════════════════════════════════════════════════════ */
        async function renderForm(slug) {
            wrap.innerHTML = '<div class="msg">Loading…</div>';

            try {
                // Decode the slug from the hash
                const decodedSlug = decodeURIComponent(slug);

                // Try to find by slug field first
                let hospital = null;
                const q = query(collection(db, 'receptionists'), where('slug', '==', decodedSlug));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    hospital = { id: snap.docs[0].id, ...snap.docs[0].data() };
                }

                // Fallback: slug might be the Firestore doc ID itself
                if (!hospital) {
                    const all = await getDocs(collection(db, 'receptionists'));
                    all.forEach(d => { if (d.id === decodedSlug) hospital = { id: d.id, ...d.data() }; });
                }

                if (!hospital) {
                    wrap.innerHTML = `<p class="err">Hospital not found. <a href="#" onclick="goHome()" style="color:#4285f4">← Back</a></p>`;
                    return;
                }

                // Update breadcrumb


                const open = fmtTime(hospital.openTime);
                const close = fmtTime(hospital.closeTime);
                const hours = (open && close)
                    ? `<span class="hours-dot"></span><span>${open} – ${close}</span>`
                    : '<span style="color:#444">Hours not set</span>';

                let doctorOpts = '<option value="">Choose a doctor…</option>';
                if (hospital.doctors?.length) {
                    hospital.doctors.forEach(n => { doctorOpts += `<option value="${n}">${n}</option>`; });
                } else {
                    doctorOpts = '<option value="">No doctors listed yet</option>';
                }

                wrap.innerHTML = `
                <div class="hosp-header">
                    <div class="hosp-header-icon">🏥</div>
                    <div>
                        <div class="hosp-header-name">${hospital.hospitalName}</div>
                        <div class="hosp-header-hours">${hours}</div>
                    </div>
                </div>

                <div class="tab-bar">
                    <button class="tab-btn active" id="tab-book">📝 Book Appointment</button>
                    <button class="tab-btn"         id="tab-view">📋 View Appointments</button>
                </div>

                <div class="tab-pane active" id="pane-book">
                    <div class="form-card">
                        <div class="form-group">
                            <label>Your Full Name</label>
                            <input type="text" id="patient-name" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Select Doctor</label>
                            <select id="doctor-select">${doctorOpts}</select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Date &amp; Time
                                <span style="text-transform:none;letter-spacing:0;font-weight:400;color:#666">(within 24 hrs)</span>
                            </label>
                            <input type="datetime-local" id="time-select">
                        </div>
                        <div class="form-group">
                            <label>Problem Description</label>
                            <textarea id="problem" rows="2" placeholder="e.g. Fever, headache…"></textarea>
                        </div>
                        <button class="btn-submit" id="btn-book">✓ Confirm Booking</button>
                    </div>
                </div>

                <div class="tab-pane" id="pane-view">
                    <div id="appt-wrap"><div class="msg">Loading appointments…</div></div>
                </div>`;

                setDatetimeLimits();

                // Tab handlers
                document.getElementById('tab-book').addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    document.getElementById('tab-book').classList.add('active');
                    document.getElementById('pane-book').classList.add('active');
                });
                document.getElementById('tab-view').addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    document.getElementById('tab-view').classList.add('active');
                    document.getElementById('pane-view').classList.add('active');
                    loadAppts(hospital.id);
                });

                // Book handler
                document.getElementById('btn-book').addEventListener('click', () =>
                    bookAppt(hospital.id, hospital.hospitalName)
                );

            } catch (e) {
                console.error(e);
                wrap.innerHTML = '<p class="err">Failed to load hospital. Please refresh.</p>';
            }
        }

        /* ── Load appointments (patient view) ────────────────── */
        async function loadAppts(hospitalId) {
            const w = document.getElementById('appt-wrap');
            if (!w) return;
            w.innerHTML = '<div class="msg">Loading…</div>';
            try {
                const snap = await getDocs(query(
                    collection(db, 'appointments'),
                    where('hospitalId', '==', hospitalId)
                ));

                if (snap.empty) {
                    w.innerHTML = '<div class="appt-empty"><div class="appt-empty-icon">📅</div><p>No appointments yet.</p></div>';
                    return;
                }

                // Sort newest first client-side (no Firestore composite index needed)
                const docs = snap.docs.sort((a, b) =>
                    (b.data().bookedAt || '').localeCompare(a.data().bookedAt || '')
                );

                const list = document.createElement('div');
                list.className = 'appt-list';
                docs.forEach(d => {
                    const data = d.data();
                    const row = document.createElement('div');
                    row.className = 'appt-row';
                    row.innerHTML = `
                    <div><div class="field-label">Patient</div><div class="field-val">${data.name}</div></div>
                    <div><div class="field-label">Doctor</div><div class="field-val">${data.doctor}</div></div>
                    <div><div class="field-label">Time</div><div class="field-val">${data.time}</div></div>
                    <span class="badge">${data.status || 'Booked'}</span>`;
                    list.appendChild(row);
                });
                w.innerHTML = '';
                w.appendChild(list);
            } catch (e) {
                console.error(e);
                w.innerHTML = '<p class="err">Failed to load appointments.</p>';
            }
        }

        /* ── Book appointment ────────────────────────────────── */
        async function bookAppt(hospitalId, hospitalName) {
            const name = document.getElementById('patient-name').value.trim();
            const doctor = document.getElementById('doctor-select').value;
            const time = document.getElementById('time-select').value;
            const prob = document.getElementById('problem').value;

            if (!name || !doctor || !time) { alert('Please fill in all required fields.'); return; }

            const selTime = new Date(time), now = new Date(), max = new Date(now.getTime() + 86400000);
            if (selTime < now) { alert('Please select a future time.'); return; }
            if (selTime > max) { alert('Booking is only allowed within the next 24 hours.'); return; }

            const displayTime = selTime.toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            const btn = document.getElementById('btn-book');
            btn.disabled = true; btn.textContent = 'Booking…';
            try {
                await addDoc(collection(db, 'appointments'), {
                    hospitalId, hospitalName,
                    name, doctor, time: displayTime,
                    appointmentDate: selTime.toISOString(),
                    problem: prob || 'N/A', status: 'Booked',
                    bookedAt: new Date().toISOString()
                });
                alert(`✅ Booked with ${doctor} at ${displayTime}!`);
                document.getElementById('patient-name').value = '';
                document.getElementById('problem').value = '';
                document.getElementById('doctor-select').selectedIndex = 0;
                setDatetimeLimits();
            } catch (e) {
                console.error(e); alert('Booking failed. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = '✓ Confirm Booking';
            }
        }

        /* ── Boot: read hash and decide which view ───────────── */
        function boot() {
            const slug = getSlug();
            if (slug) {
                renderForm(slug);
            } else {
                renderGrid();
            }
        }

        boot();
    </script>
</body>

<!-- Timestamp updated -->
