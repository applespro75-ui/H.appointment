<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Portal System</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Google Sans', 'Roboto', 'Segoe UI', sans-serif;
        }

        body {
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            padding: 40px 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(66, 133, 244, 0.15);
            border: 1px solid rgba(66, 133, 244, 0.3);
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 0.85rem;
            color: #4285f4;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
        }

        .header-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4285f4;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a0c4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 60px;
            color: #9aa0a6;
            font-weight: 400;
        }

        .card-container {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1c1f26;
            border: 1px solid #2d3748;
            padding: 44px 40px 36px;
            border-radius: 28px;
            width: 300px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            color: #e0e0e0;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card.patient::before {
            background: radial-gradient(circle at 50% 0%, rgba(52, 168, 83, 0.12) 0%, transparent 70%);
        }

        .card.receptionist::before {
            background: radial-gradient(circle at 50% 0%, rgba(66, 133, 244, 0.12) 0%, transparent 70%);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .card.patient:hover {
            border-color: #34a853;
        }

        .card.receptionist:hover {
            border-color: #4285f4;
        }

        .illustration-wrapper {
            width: 180px;
            height: 160px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            transition: transform 0.35s ease;
        }

        .card.patient .illustration-wrapper {
            background: linear-gradient(145deg, #e8f5e9, #c8e6c9);
        }

        .card.receptionist .illustration-wrapper {
            background: linear-gradient(145deg, #e3f2fd, #bbdefb);
        }

        .card:hover .illustration-wrapper {
            transform: scale(1.05);
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .card p {
            font-size: 0.95rem;
            color: #9aa0a6;
            line-height: 1.6;
            margin: 0;
        }


        footer {
            margin-top: 64px;
            font-size: 0.85rem;
            color: #5f6368;
        }
    </style>
</head>

<body>
    <div class="header-badge">Hospital Portal System</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Select your role to access your personalized portal</p>

    <div class="card-container">

        <!-- Patient Card -->
        <a href="patient-login.html" class="card patient">
            <div class="illustration-wrapper">
                <!-- Patient SVG Illustration -->
                <svg width="140" height="130" viewBox="0 0 140 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background circle -->
                    <circle cx="70" cy="65" r="55" fill="#a5d6a7" opacity="0.3" />
                    <!-- Body / Chair -->
                    <rect x="42" y="78" width="56" height="8" rx="4" fill="#66bb6a" />
                    <rect x="40" y="85" width="6" height="28" rx="3" fill="#66bb6a" />
                    <rect x="94" y="85" width="6" height="28" rx="3" fill="#66bb6a" />
                    <rect x="40" y="110" width="60" height="6" rx="3" fill="#4caf50" />
                    <!-- Person legs -->
                    <rect x="53" y="85" width="14" height="22" rx="6" fill="#f9a825" />
                    <rect x="73" y="85" width="14" height="22" rx="6" fill="#f9a825" />
                    <!-- Shoes -->
                    <ellipse cx="60" cy="108" rx="9" ry="5" fill="#37474f" />
                    <ellipse cx="80" cy="108" rx="9" ry="5" fill="#37474f" />
                    <!-- Torso -->
                    <rect x="52" y="56" width="36" height="32" rx="10" fill="#f8bbd0" />
                    <!-- Collar / shirt mark -->
                    <path d="M65 58 L70 65 L75 58" stroke="#e91e63" stroke-width="2" fill="none"
                        stroke-linecap="round" />
                    <!-- Arms -->
                    <rect x="38" y="60" width="16" height="10" rx="5" fill="#f8bbd0" />
                    <rect x="86" y="60" width="16" height="10" rx="5" fill="#f8bbd0" />
                    <!-- Hands -->
                    <circle cx="36" cy="65" r="6" fill="#ffccbc" />
                    <circle cx="104" cy="65" r="6" fill="#ffccbc" />
                    <!-- Clipborad in hand -->
                    <rect x="96" y="58" width="14" height="18" rx="2" fill="#fff9c4" stroke="#fdd835"
                        stroke-width="1.5" />
                    <line x1="99" y1="63" x2="107" y2="63" stroke="#fdd835" stroke-width="1.5" />
                    <line x1="99" y1="67" x2="107" y2="67" stroke="#fdd835" stroke-width="1.5" />
                    <line x1="99" y1="71" x2="104" y2="71" stroke="#fdd835" stroke-width="1.5" />
                    <!-- Head -->
                    <circle cx="70" cy="42" r="18" fill="#ffccbc" />
                    <!-- Hair -->
                    <path d="M52 38 Q52 22 70 22 Q88 22 88 38" fill="#5d4037" />
                    <ellipse cx="70" cy="23" rx="18" ry="6" fill="#5d4037" />
                    <!-- Eyes -->
                    <circle cx="63" cy="40" r="2.5" fill="#37474f" />
                    <circle cx="77" cy="40" r="2.5" fill="#37474f" />
                    <circle cx="64" cy="39" r="1" fill="white" />
                    <circle cx="78" cy="39" r="1" fill="white" />
                    <!-- Smile -->
                    <path d="M64 46 Q70 51 76 46" stroke="#e67e22" stroke-width="1.8" fill="none"
                        stroke-linecap="round" />
                    <!-- Cross / medical badge -->
                    <circle cx="105" cy="42" r="10" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" />
                    <rect x="102" y="38" width="6" height="8" rx="1" fill="#34a853" />
                    <rect x="100" y="40" width="10" height="4" rx="1" fill="#34a853" />
                </svg>
            </div>
            <h2>I am a Patient</h2>
            <p>Book appointments with top doctors near you</p>

        </a>

        <!-- Receptionist Card -->
        <a href="receptionist-login.html" class="card receptionist">
            <div class="illustration-wrapper">
                <!-- Receptionist SVG Illustration -->
                <svg width="140" height="130" viewBox="0 0 140 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background circle -->
                    <circle cx="70" cy="65" r="55" fill="#90caf9" opacity="0.3" />
                    <!-- Desk -->
                    <rect x="18" y="90" width="104" height="10" rx="5" fill="#4fc3f7" />
                    <rect x="24" y="100" width="8" height="25" rx="4" fill="#4fc3f7" />
                    <rect x="108" y="100" width="8" height="25" rx="4" fill="#4fc3f7" />
                    <!-- Computer Monitor -->
                    <rect x="50" y="62" width="50" height="32" rx="5" fill="#1a237e" />
                    <rect x="53" y="65" width="44" height="24" rx="3" fill="#4fc3f7" opacity="0.9" />
                    <!-- Screen content lines -->
                    <line x1="57" y1="70" x2="83" y2="70" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <line x1="57" y1="75" x2="90" y2="75" stroke="white" stroke-width="1.5" stroke-linecap="round"
                        opacity="0.7" />
                    <line x1="57" y1="80" x2="78" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round"
                        opacity="0.7" />
                    <!-- Monitor stand -->
                    <rect x="71" y="93" width="8" height="6" rx="2" fill="#1a237e" />
                    <rect x="64" y="98" width="22" height="4" rx="2" fill="#1a237e" />
                    <!-- Keyboard -->
                    <rect x="38" y="87" width="40" height="6" rx="3" fill="#b0bec5" />
                    <!-- Person Body -->
                    <rect x="30" y="58" width="30" height="36" rx="12" fill="#7986cb" />
                    <!-- Collar -->
                    <path d="M41 60 L45 68 L49 60" stroke="#5c6bc0" stroke-width="2" fill="none"
                        stroke-linecap="round" />
                    <!-- Left arm - typing -->
                    <path d="M30 70 Q22 72 30 82" stroke="#7986cb" stroke-width="10" stroke-linecap="round"
                        fill="none" />
                    <!-- Right arm - typing -->
                    <path d="M60 70 Q68 72 60 82" stroke="#7986cb" stroke-width="10" stroke-linecap="round"
                        fill="none" />
                    <!-- Hands on keyboard -->
                    <circle cx="30" cy="85" r="7" fill="#ffccbc" />
                    <circle cx="60" cy="85" r="7" fill="#ffccbc" />
                    <!-- Head -->
                    <circle cx="45" cy="44" r="18" fill="#ffccbc" />
                    <!-- Hair bun -->
                    <path d="M27 38 Q28 21 45 21 Q62 21 63 38" fill="#4e342e" />
                    <circle cx="55" cy="23" r="8" fill="#4e342e" />
                    <!-- Eyes -->
                    <circle cx="38" cy="43" r="2.5" fill="#37474f" />
                    <circle cx="52" cy="43" r="2.5" fill="#37474f" />
                    <circle cx="39" cy="42" r="1" fill="white" />
                    <circle cx="53" cy="42" r="1" fill="white" />
                    <!-- Smile -->
                    <path d="M39 49 Q45 54 51 49" stroke="#e67e22" stroke-width="1.8" fill="none"
                        stroke-linecap="round" />
                    <!-- Headset -->
                    <path d="M27 40 Q27 26 45 26 Q63 26 63 40" stroke="#37474f" stroke-width="3" fill="none"
                        stroke-linecap="round" />
                    <rect x="24" y="38" width="6" height="10" rx="3" fill="#37474f" />
                    <rect x="23" y="48" width="5" height="2" rx="1" fill="#4fc3f7" />
                    <!-- Notification badge -->
                    <circle cx="112" cy="36" r="12" fill="#f44336" />
                    <text x="112" y="41" text-anchor="middle" font-size="12" fill="white" font-weight="bold"
                        font-family="Roboto, sans-serif">3</text>
                    <!-- Small calendar icon -->
                    <rect x="100" y="56" width="22" height="20" rx="3" fill="white" stroke="#4285f4"
                        stroke-width="1.5" />
                    <rect x="100" y="56" width="22" height="7" rx="3" fill="#4285f4" />
                    <line x1="106" y1="69" x2="109" y2="69" stroke="#4285f4" stroke-width="1.5" />
                    <line x1="113" y1="69" x2="116" y2="69" stroke="#4285f4" stroke-width="1.5" />
                    <line x1="106" y1="73" x2="109" y2="73" stroke="#4285f4" stroke-width="1.5" />
                    <line x1="113" y1="73" x2="116" y2="73" stroke="#4285f4" stroke-width="1.5" />
                </svg>
            </div>
            <h2>I am a Receptionist</h2>
            <p>Manage hospital appointments and doctors</p>

        </a>

    </div>

    <footer>
        &copy; 2026 Hospital Portal System &mdash; All rights reserved
    </footer>
</body>

</html>
