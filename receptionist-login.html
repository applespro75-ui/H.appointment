<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Login - Hospital Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e0e0e0;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid #333;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            margin-bottom: 10px;
        }

        p {
            color: #a0a0a0;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #888;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            margin-bottom: -2px;
        }

        .tab:hover {
            color: #ccc;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
            font-size: 14px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 15px;
            background: #2d2d2d;
            color: white;
            transition: border-color 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            background: #333;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-section.active {
            display: block;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        .loading {
            position: relative;
            color: transparent !important;
        }

        .loading::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #888;
            transition: color 0.3s;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #3498db;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Hospital Portal</h1>
            <p>Manage your hospital and appointments</p>
        </div>

        <div class="tabs">
            <div id="tab-login" class="tab active">Login</div>
            <div id="tab-signup" class="tab">Signup</div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-section active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="admin@hospital.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="••••••••">
                    <button type="button" class="toggle-password" id="toggle-login-password"
                        title="Show password">👁️</button>
                </div>
            </div>
            <p id="login-error" class="error-message"></p>
            <button class="btn" id="btn-login-action">Access Dashboard</button>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-section">
            <div class="form-group">
                <label>Full Name (Receptionist)</label>
                <input type="text" id="reg-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Hospital Name</label>
                <input type="text" id="reg-hospital" placeholder="City Care Hospital">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="admin@hospital.com">
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" id="reg-contact" placeholder="+91 98765 43210">
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-password" placeholder="••••••••">
                    <button type="button" class="toggle-password" id="toggle-reg-password"
                        title="Show password">👁️</button>
                </div>
            </div>
            <p id="reg-error" class="error-message"></p>
            <button class="btn" id="btn-register-action">Create Hospital Account</button>
        </div>
    </div>

    <script>
        // Tab Switching Logic (Non-Module for Reliability)
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.tab');
            const forms = document.querySelectorAll('.form-section');

            function switchTab(tabName) {
                tabs.forEach(t => t.classList.remove('active'));
                forms.forEach(f => f.classList.remove('active'));

                if (tabName === 'login') {
                    document.getElementById('tab-login').classList.add('active');
                    document.getElementById('login-form').classList.add('active');
                } else {
                    document.getElementById('tab-signup').classList.add('active');
                    document.getElementById('register-form').classList.add('active');
                }
            }

            const loginTab = document.getElementById('tab-login');
            const signupTab = document.getElementById('tab-signup');

            if (loginTab) loginTab.addEventListener('click', () => switchTab('login'));
            if (signupTab) signupTab.addEventListener('click', () => switchTab('signup'));
        });
    </script>

    <script type="module">
        import { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, doc, setDoc, sendEmailVerification, signOut } from './firebase-config.js';

        // Firebase Auth Logic

        const handleLogin = async () => {
            console.log("Login button clicked");
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.querySelector('#login-form .btn');
            const errorMsg = document.getElementById('login-error');

            if (!email || !password) {
                showError(errorMsg, "Please fill in all fields");
                return;
            }

            setLoading(btn, true);
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    await signOut(auth);
                    throw { code: 'auth/email-not-verified' };
                }

                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                showError(errorMsg, getErrorMessage(error.code));
                setLoading(btn, false);
            }
        };

        const handleRegister = async () => {
            console.log("Register button clicked");
            const name = document.getElementById('reg-name').value;
            const hospitalName = document.getElementById('reg-hospital').value;
            const email = document.getElementById('reg-email').value;
            const contact = document.getElementById('reg-contact').value;

            const password = document.getElementById('reg-password').value;
            const btn = document.querySelector('#register-form .btn');
            const errorMsg = document.getElementById('reg-error');

            if (!name || !hospitalName || !email || !contact || !password) {
                showError(errorMsg, "All fields are required");
                return;
            }

            // Validation: Gmail only
            if (!email.toLowerCase().endsWith('@gmail.com')) {
                showError(errorMsg, "Please use a valid @gmail.com address");
                return;
            }

            // Validation: 10-digit phone number
            const phoneRegex = /^\d{10}$/;
            if (!phoneRegex.test(contact)) {
                showError(errorMsg, "Phone number must be exactly 10 digits");
                return;
            }

            // Process doctors list (Initially empty)
            const doctors = [];

            // Generate Slug
            const slug = hospitalName.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-' + Math.floor(Math.random() * 1000);

            setLoading(btn, true);
            try {
                // 1. Create Auth User
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save Profile to Firestore with Slug
                await setDoc(doc(db, "receptionists", user.uid), {
                    name,
                    hospitalName,
                    slug: slug,
                    email,
                    contact,
                    doctors,
                    hospitalAddress: "",
                    createdAt: new Date().toISOString()
                });

                alert(`Hospital Registered Successfully!\nYour Unique Hospital ID is: ${slug}`);

                // 3. Send Verification Email & Force Logout
                await sendEmailVerification(user);
                await signOut(auth);

                alert(`Registration Successful!\nA verification email has been sent to ${email}.\nPlease verify your email before logging in.`);

                // Switch to login tab
                document.getElementById('tab-login').click();
                document.getElementById('login-email').value = email;
            } catch (error) {
                console.error(error);
                showError(errorMsg, getErrorMessage(error.code));
                setLoading(btn, false);
            }
        };

        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function showError(element, message) {
            element.textContent = message;
            element.style.display = 'block';
        }

        function getErrorMessage(code) {
            switch (code) {
                case 'auth/email-already-in-use': return "Email is already registered";
                case 'auth/invalid-email': return "Invalid email address";
                case 'auth/weak-password': return "Password should be at least 6 characters";
                case 'auth/user-not-found': return "No account found with this email";
                case 'auth/wrong-password': return "Incorrect password";
                case 'auth/email-not-verified': return "Please verify your email address before logging in.";
                default: return "An error occurred. Please try again.";
            }
        }

        // Password Toggle Functionality
        function togglePasswordVisibility(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);

            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
                button.title = 'Hide password';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
                button.title = 'Show password';
            }
        }

        // Enter Key Support
        function setupEnterKey(inputIds, handler) {
            inputIds.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            handler();
                        }
                    });
                }
            });
        }

        // Attach Event Listeners - Wait for DOM to be fully loaded
        window.addEventListener('load', () => {
            const btnLogin = document.getElementById('btn-login-action');
            const btnRegister = document.getElementById('btn-register-action');
            const toggleLoginPw = document.getElementById('toggle-login-password');
            const toggleRegPw = document.getElementById('toggle-reg-password');

            if (btnLogin) {
                btnLogin.addEventListener('click', handleLogin);
            }

            if (btnRegister) {
                btnRegister.addEventListener('click', handleRegister);
            }

            // Password toggle buttons
            if (toggleLoginPw) {
                toggleLoginPw.addEventListener('click', () => {
                    togglePasswordVisibility('login-password', 'toggle-login-password');
                });
            }

            if (toggleRegPw) {
                toggleRegPw.addEventListener('click', () => {
                    togglePasswordVisibility('reg-password', 'toggle-reg-password');
                });
            }

            // Enter key support for login form
            setupEnterKey(['login-email', 'login-password'], handleLogin);

            // Enter key support for register form
            setupEnterKey(['reg-name', 'reg-hospital', 'reg-email', 'reg-contact', 'reg-password'], handleRegister);
        });
    </script>
</body>

</html>
